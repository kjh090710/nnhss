<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f8fa">
  <meta name="description" content="혼디봄 AI 안심 돌봄 연결 해커톤 프로토타입">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <title>혼디봄 · 지역 안심 돌봄 운영실</title>
</head>
<body>
  <a class="skip-link" href="#app">본문 바로가기</a>

  <svg aria-hidden="true" class="svg-sprite">
    <symbol id="i-dashboard" viewBox="0 0 24 24"><path d="M4 13h6V4H4v9Zm0 7h6v-4H4v4Zm10 0h6v-9h-6v9Zm0-16v4h6V4h-6Z"/></symbol>
    <symbol id="i-scan" viewBox="0 0 24 24"><path d="M4 8V5a1 1 0 0 1 1-1h3m8 0h3a1 1 0 0 1 1 1v3M4 16v3a1 1 0 0 0 1 1h3m8 0h3a1 1 0 0 0 1-1v-3M8 12h8"/></symbol>
    <symbol id="i-bell" viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Zm-8 12h4"/></symbol>
    <symbol id="i-users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2m7-10a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm13 10v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
    <symbol id="i-cpu" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/><path d="M9 1v3m6-3v3M9 20v3m6-3v3M20 9h3m-3 6h3M1 9h3m-3 6h3m8-5h2v4h-4v-2"/></symbol>
    <symbol id="i-chart" viewBox="0 0 24 24"><path d="M3 3v18h18M7 16l4-5 3 3 5-7"/></symbol>
    <symbol id="i-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/></symbol>
    <symbol id="i-arrow" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/></symbol>
    <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 4v7h-7"/></symbol>
    <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
    <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
    <symbol id="i-alert" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.9 2.5 17.4A2 2 0 0 0 4.2 20h15.6a2 2 0 0 0 1.7-2.6L13.7 3.9a2 2 0 0 0-3.4 0Z"/></symbol>
    <symbol id="i-map" viewBox="0 0 24 24"><path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3-6-3Z"/><path d="M9 3v15m6-12v15"/></symbol>
    <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
    <symbol id="i-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></symbol>
    <symbol id="i-wifi" viewBox="0 0 24 24"><path d="M5 12.6a11 11 0 0 1 14 0M8.5 16a6 6 0 0 1 7 0M12 20h.01M2 9a16 16 0 0 1 20 0"/></symbol>
    <symbol id="i-thermometer" viewBox="0 0 24 24"><path d="M14 14.8V5a4 4 0 0 0-8 0v9.8a6 6 0 1 0 8 0Z"/><path d="M10 6v10"/></symbol>
  </svg>

  <div class="site-shell">
    <header class="topbar">
      <div class="topbar-row">
        <a href="#/dashboard" class="wordmark" aria-label="혼디봄 대시보드">
          <span class="wordmark-symbol">혼</span>
          <span class="wordmark-copy">
            <strong>혼디봄</strong>
            <small>SW 인재 양성 해커톤</small>
          </span>
        </a>

        <div class="topbar-meta">
          <span class="system-status"><i></i> 데모 서버 정상</span>
          <button class="topbar-action" id="resetButton" type="button" aria-label="데모 데이터 초기화" title="데모 데이터 초기화">
            <svg><use href="#i-refresh"/></svg>
          </button>
        </div>
      </div>

      <nav class="route-tabs" aria-label="주 메뉴">
        <a href="#/dashboard" data-route="dashboard"><svg><use href="#i-dashboard"/></svg><span>운영 현황</span></a>
        <a href="#/analyze" data-route="analyze"><svg><use href="#i-scan"/></svg><span>신호 분석</span></a>
        <a href="#/partners" data-route="partners"><svg><use href="#i-users"/></svg><span>안심파트너</span></a>
        <a href="#/devices" data-route="devices"><svg><use href="#i-cpu"/></svg><span>장치 연결</span></a>
        <a href="#/model" data-route="model"><svg><use href="#i-chart"/></svg><span>AI 모델</span></a>
        <a href="#/safety" data-route="safety"><svg><use href="#i-shield"/></svg><span>안전 기록</span></a>
      </nav>
    </header>

    <main id="app" class="page-stage" tabindex="-1">
      <div class="page-skeleton" aria-label="화면 불러오는 중">
        <div class="skeleton-line w-30"></div>
        <div class="skeleton-line title"></div>
        <div class="skeleton-grid"><div></div><div></div><div></div></div>
        <div class="skeleton-panel"></div>
      </div>
    </main>

    <footer class="site-footer">
      <p></p>
      <span>개발자: 강준환, 홍지운, 현예은, 이다영</span>
    </footer>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRegion" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <script src="/app.js" defer></script>
</body>
</html>
