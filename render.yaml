services:
  - type: web
    name: hondibom-js
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: STATE_PATH
        value: /tmp/hondibom-state.json
      - key: NODE_ENV
        value: production
